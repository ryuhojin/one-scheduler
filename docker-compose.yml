services:
  postgres:
    image: postgres:16-alpine
    container_name: one-line-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-one_line}
      POSTGRES_USER: ${POSTGRES_USER:-one_line}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-one_line_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-one_line} -d ${POSTGRES_DB:-one_line}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: one-line-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: one-line-api
    restart: unless-stopped
    working_dir: /workspace
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3000}
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://one_line:one_line_dev_password@postgres:5432/one_line}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm --filter @one-line/api dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile.dev
    container_name: one-line-admin-web
    restart: unless-stopped
    working_dir: /workspace
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WEB_PORT: ${WEB_PORT:-5173}
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm --filter @one-line/admin-web dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  web_node_modules:
  pnpm_store:
